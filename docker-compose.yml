services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    environment:
      # Пароль для админа Keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      # Пока embedded БД для простоты
      KC_DB: dev-file
    ports:
      # Открываем порт для доступа
      - "8080:8080"
    command:
      # Запускаем в development режиме
      - start-dev

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_MULTIPLE_DATABASES: UsersDb,StorageDb,OrderPickingDb,OrdersDb
    ports:
      - "5433:5432"
    networks:
      - shop-pg-network
    labels:
      - app=shop
    restart: unless-stopped
    healthcheck:
      test: "pg_isready -U postgres"
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.1-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5673:5672"
      - "15673:15672"
    restart: unless-stopped
    networks:
      - shop-network
    labels:
      - app=shop
    healthcheck:
      test: "rabbitmqctl status > /dev/null 2>&1;"
      interval: 5s
      timeout: 5s
      retries: 5

  storage-service:
    image: storage-service
    build:
      context: .
      dockerfile: StorageService/StorageService.Api/Dockerfile
    ports:
      - "8081:8080"
    pull_policy: build
    environment:
      CONNECTION_STRING: Host=postgres:5432;Username=postgres;Password=P@ssw0rd;Database=StorageDb
      RMQ_HOST: rabbitmq
      RMQ_PORT: 5672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_PICKING_COMPLETED_QUEUE: picking-completed-exchange
      RMQ_PICKING_COMPLETED_STORAGE_SERVICE_QUEUE: storage-service-queue
      RMQ_PRODUCT_FROM_STORAGE_QUEUE: storage-product-messages-queue
      ASPNETCORE_ENVIRONMENT: "Staging"
      ASPNETCORE_URLS: http://+:8080
    healthcheck:
      test: "curl -f http://localhost:8080/health"
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - shop-network
      - shop-pg-network

  order-picking-service:
    image: order-picking-service
    build:
      context: .
      dockerfile: OrderPickingService/OrderPickingService.Api/Dockerfile
    ports:
      - "8082:8080"
    environment:
      #CONNECTION_STRING: Host=postgres:5432;Username=postgres;Password=P@ssw0rd;Database=OrderPickingDb
      DataBase__ConnectionString: Host=postgres;Port=5432;Database=OrderPickingDb;Username=postgres;Password=P@ssw0rd
      RMQ_HOST: rabbitmq
      RMQ_PORT: 5672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_PICKING_COMPLETED_QUEUE: picking-completed-exchange
      STORAGE_SERVICE_URL: http://storage-service:8080
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      storage-service:
        condition: service_healthy
    networks:
      - shop-network
      - shop-pg-network
    restart: unless-stopped

  order-service:
    image: order-service
    build:
      context: .
      dockerfile: OrdersService.Api/Dockerfile
    ports:
      - "8083:8080"
    environment:
      #CONNECTION_STRING: Host=postgres;Port=5432;Database=OrdersDb;Username=postgres;Password=P@ssw0rd
      ConnectionStrings__OrdersDb: Host=postgres;Port=5432;Database=OrdersDb;Username=postgres;Password=P@ssw0rd
      Warehouse__BaseUrl: http://storage-service:8080
      OrderPicking__BaseUrl: http://order-picking-service:8080
      RMQ_HOST: rabbitmq
      RMQ_PORT: 5672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_PICKING_COMPLETED_QUEUE: picking-completed-exchange
      RMQ_PICKING_COMPLETED_ORDER_SERVICE_QUEUE: order-service-queue
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - shop-network
      - shop-pg-network
    restart: unless-stopped

networks:
  shop-network:
    name: shop-network
    labels:
      - app=shop
  shop-pg-network:
    name: shop-pg-network
    labels:
      - app=shop